<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$The Bank$</title>
<style>
body{
margin:0;font-family:Inter,Arial,sans-serif;background:#000;color:#fff;
overflow-x:hidden;
}
.bg{
position:fixed;inset:0;
background:linear-gradient(135deg,#000,#111,#000);
z-index:-1;
}
.lightning{
position:absolute;width:2px;height:100vh;background:rgba(255,255,255,.15);
animation:flash 6s infinite;
}
.lightning:nth-child(2){left:25%;animation-delay:1s}
.lightning:nth-child(3){left:50%;animation-delay:2s}
.lightning:nth-child(4){left:75%;animation-delay:3s}
@keyframes flash{0%,95%,100%{opacity:.1}96%,98%{opacity:1}}
.container{max-width:1200px;margin:auto;padding:20px}
.card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.2);
border-radius:20px;padding:20px;margin:15px 0;
}
.balance{font-size:3rem;font-weight:bold}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
button{
background:#fff;color:#000;border:none;padding:10px 15px;
border-radius:10px;cursor:pointer;font-weight:bold;
}
input,select{
width:100%;padding:10px;margin:8px 0;background:#111;color:#fff;
border:1px solid #444;border-radius:10px;
}
@media(max-width:800px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="bg">
<div class="lightning"></div>
<div class="lightning"></div>
<div class="lightning"></div>
<div class="lightning"></div>
</div>

<div class="container">
<h1>Freeism Bank</h1>

<div class="card">
<h2 id="title">Your Balance</h2>
<div class="balance"><span id="balance">100</span> ξ</div>
</div>

<div class="grid">
<div class="card">
<h3>Wire Honors</h3>
<input id="user" placeholder="Username">
<input id="amount" type="number" placeholder="Amount">
<input id="code" placeholder="Account Code">
<button onclick="wire()">Send</button>
</div>

<div class="card">
<h3>Weekly Taxes</h3>
<p>Tax Due: 17 ξ</p>
<button onclick="payTax()">Pay Taxes</button>
</div>
</div>

<div class="card">
<h3>Stocks</h3>
<select id="stock">
<option>ZCRY</option></option>
<option>DSMN</option>
<option>LCS</option>
<option>HRSN</option>
<option>VJVL</option>
<option>CHRL</option>
</select>
<button onclick="buyStock()">Buy Share</button>
<p id="shares">Shares Owned: 0</p>
</div>

<div class="card">
<h3>Recent Transactions</h3>
<ul id="tx"></ul>
</div>

<div class="card">
<button onclick="location.href='hub.html'">Back To Hub</button>
<button onclick="location.href='miner.html'">Mine</button>
</div>
</div>

<script>
let balance=Number(localStorage.getItem("balance")||100);
let shares=Number(localStorage.getItem("shares")||0);

function update(){
document.getElementById("balance").textContent=balance;
document.getElementById("shares").textContent="Shares Owned: "+shares;
localStorage.setItem("balance",balance);
localStorage.setItem("shares",shares);
}
function addTx(t){
let tx=JSON.parse(localStorage.getItem("tx")||"[]");
tx.unshift(t);
tx=tx.slice(0,3);
localStorage.setItem("tx",JSON.stringify(tx));
renderTx();
}
function renderTx(){
let tx=JSON.parse(localStorage.getItem("tx")||"[]");
document.getElementById("tx").innerHTML=tx.map(x=>"<li>"+x+"</li>").join("");
}
function wire(){
let amt=Number(document.getElementById("amount").value);
if(amt>0 && amt<=balance){
balance-=amt;
addTx("Sent "+amt+" ξ");
update();
}
}
function payTax(){
if(balance>=17){
balance-=17;
addTx("Paid taxes 17 ξ");
update();
}
}
function buyStock(){
if(balance>=5 && shares<10){
balance-=5;
shares++;
addTx("Bought stock share");
update();
}
}
update();
renderTx();
</script>
</body>
</html>
