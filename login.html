<div class="container">
  <h1>LOGIN</h1>

  <input
    type="text"
    id="code"
    maxlength="4"
    placeholder="Enter Site Code">

  <div class="requirements">
    <div id="letters">✖ 2 Letters (A–Z)</div>
    <div id="number">✖ 1 Number (0–9)</div>
    <div id="special">✖ 1 Special Character (! @ # $ % ^ & *)</div>
    <div id="length">✖ Exactly 4 Characters</div>
  </div>

  <button onclick="login(event)">PROCEED</button>

  <small>Black / White Secure Access</small>
</div>
