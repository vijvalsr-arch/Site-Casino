<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  height: 100vh;
  background: #000;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* moving strip light */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: repeating-linear-gradient(
    90deg,
    #111 0px,
    #111 40px,
    #000 40px,
    #000 80px
  );
  animation: move 12s linear infinite;
  opacity: 0.35;
}

@keyframes move {
  0% { transform: translateX(0); }
  100% { transform: translateX(-80px); }
}

.container {
  position: relative;
  z-index: 2;
  width: 340px;
  padding: 30px;
  border: 1px solid #fff;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  text-align: center;
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

h1 {
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.toggle {
  font-size: 12px;
  margin-bottom: 20px;
  cursor: pointer;
  opacity: 0.7;
}

.toggle:hover {
  opacity: 1;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: 1px solid #fff;
  background: transparent;
  color: #fff;
  outline: none;
  transition: 0.3s;
}

input:focus {
  box-shadow: 0 0 10px #fff;
  transform: scale(1.02);
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border: 1px solid #fff;
  background: #fff;
  color: #000;
  font-weight: 700;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: 0.3s;
}

button:hover {
  background: #000;
  color: #fff;
}

/* ripple */
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.6);
  transform: scale(0);
  animation: ripple 600ms linear;
}

@keyframes ripple {
  to {
    transform: scale(4);
    opacity: 0;
  }
}

small {
  display: block;
  margin-top: 12px;
  opacity: 0.6;
  font-size: 11px;
}
</style>
</head>

<body>

<div class="container">
  <h1 id="title">LOGIN</h1>

  <div class="toggle" onclick="toggleMode()">
    Switch to <span id="modeText">Sign Up</span>
  </div>

  <input type="text" id="code" placeholder="Enter Code">
  <input type="password" id="pass" placeholder="Password">

  <div id="extraFields" style="display:none;">
    <input type="password" id="confirm" placeholder="Confirm Password">
  </div>

  <button id="mainBtn" onclick="submit(event)">PROCEED</button>

  <small>Black / White Secure Access</small>
</div>

<script>
let isSignup = false;

function toggleMode() {
  isSignup = !isSignup;

  document.getElementById("title").innerText = isSignup ? "SIGN UP" : "LOGIN";
  document.getElementById("modeText").innerText = isSignup ? "Login" : "Sign Up";
  document.getElementById("mainBtn").innerText = isSignup ? "CREATE ACCOUNT" : "PROCEED";

  document.getElementById("extraFields").style.display = isSignup ? "block" : "none";
}

function submit(e) {
  const code = document.getElementById("code").value;
  const pass = document.getElementById("pass").value;

  if (!code || !pass) {
    alert("Fill in all fields");
    return;
  }

  if (isSignup) {
    const confirm = document.getElementById("confirm").value;
    if (pass !== confirm) {
      alert("Passwords do not match");
      return;
    }

    alert("Account created!");
  } else {
    alert("Logging in...");
  }

  window.location.href = "index.html";
}

/* ripple effect */
document.querySelector("button").addEventListener("click", function (e) {
  const circle = document.createElement("span");
  const rect = this.getBoundingClientRect();

  circle.classList.add("ripple");
  circle.style.left = (e.clientX - rect.left) + "px";
  circle.style.top = (e.clientY - rect.top) + "px";

  this.appendChild(circle);

  setTimeout(() => circle.remove(), 600);
});
</script>

</body>
</html>
