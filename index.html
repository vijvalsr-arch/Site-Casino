<script>

const elders = [
"Zach Greer",
"Lucas Breaux",
"Ethan Hendrickson",
"Harrison Magner",
"Vijval Satheesh Kumar",
"Desmond Phillips"
];

function generateCode(){

    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const numbers = "0123456789";
    const specials = ["<","#","@","&","*"];

    let code = "";

    for(let i=0;i<3;i++){
        code += letters[Math.floor(Math.random()*letters.length)];
    }

    code += numbers[Math.floor(Math.random()*10)];
    code += specials[Math.floor(Math.random()*specials.length)];
    code += numbers[Math.floor(Math.random()*10)];

    return code;
}

function createAccount(){

    const name =
        document.getElementById("fullname").value.trim();

    if(name === ""){
        alert("Enter your full name.");
        return;
    }

    let code = generateCode();

    if(elders.includes(name)){

        code = "F$R" + code;

        alert(
`Congrats! You have been admissioned as a Site Elder who plays a major role in the Site by the Freeism Party. Therefore, you have some perks!

Permanent VIP
Unlimited Mining
Unlimited Casino Time
Community Pool Earnings

F$R = Freeism Profit Recipient

Your Elder Code:

${code}`
        );

    }else{

        alert(
`Your Honor Code:

${code}

SAVE THIS CODE.
IT IS YOUR LOGIN.`
        );

    }

}

function toggleTheme(){
    document.body.classList.toggle("dark");
}
