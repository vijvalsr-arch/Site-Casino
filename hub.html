<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  height: 100vh;
  background: #050505; /* darker background */
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* faint moving grain/light */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 20% 20%, #111 0%, transparent 40%),
              radial-gradient(circle at 80% 80%, #111 0%, transparent 40%);
  opacity: 0.6;
}

/* main container frame */
.hub {
  position: relative;
  width: 90%;
  max-width: 1100px;
  height: 80vh;
  border: 2px solid #fff;
  display: flex;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(8px);
  overflow: hidden;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.98); }
  to { opacity: 1; transform: scale(1); }
}

/* vertical strips */
.section {
  flex: 1;
  position: relative;
  border-right: 1px solid #333;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: 0.4s;
  overflow: hidden;
}

/* remove last border */
.section:last-child {
  border-right: none;
}

/* lighting glow behind each strip */
.section::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at center, rgba(255,255,255,0.15), transparent 60%);
  opacity: 0;
  transition: 0.4s;
}

.section:hover::before {
  opacity: 1;
}

/* hover expansion feel */
.section:hover {
  flex: 1.3;
  background: rgba(255,255,255,0.03);
}

/* text inside */
.section h2 {
  position: relative;
  z-index: 2;
  font-size: 18px;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: 0.3s;
}

.section:hover h2 {
  transform: scale(1.1);
}

/* top frame glow line */
.hub::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  height: 2px;
  width: 100%;
  background: linear-gradient(90deg, transparent, #fff, transparent);
  opacity: 0.3;
  animation: scan 6s linear infinite;
}

@keyframes scan {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

button {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 20px;
  border: 1px solid #fff;
  background: transparent;
  color: #fff;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #fff;
  color: #000;
}
</style>
</head>

<body>

<div class="hub">

  <div class="section" onclick="go('mine.html')">
    <h2>Mine</h2>
  </div>

  <div class="section" onclick="go('gamble.html')">
    <h2>Gamble</h2>
  </div>

  <div class="section" onclick="go('shop.html')">
    <h2>Shop</h2>
  </div>

  <div class="section" onclick="go('wallet.html')">
    <h2>Wallet</h2>
  </div>

  <div class="section" onclick="go('hangout.html')">
    <h2>Hangout</h2>
  </div>

</div>

<button onclick="go('login.html')">Logout</button>

<script>
function go(page) {
  document.body.style.opacity = "0.3";
  setTimeout(() => {
    window.location.href = page;
  }, 200);
}
</script>

</body>
</html>
