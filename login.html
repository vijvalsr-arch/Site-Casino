<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Site Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#000;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

/* Background */
body::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at top,#3d3d3d 0%,#111 35%,#000 80%);
    opacity:.8;
}

/* Lightning */
.lightning{
    position:absolute;
    width:3px;
    height:120%;
    background:white;
    left:50%;
    top:-10%;
    filter:blur(2px);
    opacity:.4;
    animation:flash 3s infinite;
}

@keyframes flash{
    0%,100%{opacity:.15;}
    48%{opacity:.2;}
    49%{opacity:.9;}
    50%{opacity:.3;}
    51%{opacity:.8;}
    52%{opacity:.2;}
}

.container{
    position:relative;
    width:420px;
    border:2px solid white;
    padding:40px;
    background:rgba(0,0,0,.7);
    backdrop-filter:blur(8px);
}

h1{
    text-align:center;
    font-size:34px;
    margin-bottom:10px;
    letter-spacing:2px;
}

.subtitle{
    text-align:center;
    color:#cfcfcf;
    margin-bottom:30px;
    line-height:1.5;
}

label{
    font-weight:700;
}

input{
    width:100%;
    margin-top:10px;
    padding:14px;
    background:#111;
    border:1px solid white;
    color:white;
    font-size:18px;
    text-transform:uppercase;
    letter-spacing:2px;
}

input:focus{
    outline:none;
    border-color:white;
    box-shadow:0 0 10px white;
}

.rules{
    margin-top:15px;
    padding:12px;
    border:1px solid white;
    background:#111;
    font-size:14px;
    line-height:1.7;
}

.rules strong{
    color:white;
}

button{
    width:100%;
    margin-top:25px;
    padding:15px;
    background:white;
    color:black;
    border:none;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    background:#d9d9d9;
}

.error{
    margin-top:15px;
    color:#ff5b5b;
    font-weight:700;
    text-align:center;
}

.success{
    margin-top:15px;
    color:#7CFF8B;
    font-weight:700;
    text-align:center;
}
</style>

</head>
<body>

<div class="lightning"></div>

<div class="container">

<h1>LOGIN</h1>

<div class="subtitle">
Enter your Site Code to continue.
</div>

<label>Site Code</label>

<input
id="code"
type="text"
maxlength="4"
placeholder="Example: AB7#">

<div class="rules">
<strong>Your Site Code must contain:</strong><br><br>

✅ 2 Letters (A-Z)<br>
✅ 1 Number (0-9)<br>
✅ 1 Special Character (! @ # $ % ^ & *)<br>
✅ Exactly 4 Characters Total
</div>

<button onclick="login()">Proceed</button>

<div id="message"></div>

</div>

<script>
function login(){

const code=document.getElementById("code").value.toUpperCase();
const msg=document.getElementById("message");

// Exactly 2 letters, 1 number, 1 special character (any order)
const regex=/^(?=(?:.*[A-Z]){2})(?=.*\d)(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>/?])[A-Z\d!@#$%^&*()_+\-=\[\]{};':"\\|,.<>/?]{4}$/;

if(regex.test(code)){
    msg.className="success";
    msg.innerHTML="✔ Code format accepted.";
}
else{
    msg.className="error";
    msg.innerHTML="✖ Invalid Site Code. It must contain exactly 2 letters, 1 number, and 1 special character.";
}
}
</script>

</body>
</html>
