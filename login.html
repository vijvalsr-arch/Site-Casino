<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,sans-serif;
}

body{
    height:100vh;
    background:#000;
    color:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Animated Background */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:repeating-linear-gradient(
        90deg,
        #111 0px,
        #111 40px,
        #000 40px,
        #000 80px
    );
    animation:move 12s linear infinite;
    opacity:.35;
}

@keyframes move{
    from{transform:translateX(0);}
    to{transform:translateX(-80px);}
}

/* Login Box */
.container{
    position:relative;
    z-index:5;
    width:360px;
    padding:30px;
    border:1px solid #fff;
    background:rgba(0,0,0,.72);
    backdrop-filter:blur(8px);
    animation:fade .8s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    text-align:center;
    margin-bottom:8px;
    letter-spacing:2px;
    font-size:34px;
}

.subtitle{
    text-align:center;
    color:#bdbdbd;
    margin-bottom:25px;
    font-size:14px;
}

input{
    width:100%;
    padding:13px;
    border:1px solid #fff;
    background:transparent;
    color:#fff;
    font-size:17px;
    text-transform:uppercase;
    outline:none;
    transition:.25s;
}

input:focus{
    box-shadow:0 0 12px rgba(255,255,255,.7);
}

.requirements{
    margin-top:18px;
    border:1px solid #fff;
    padding:15px;
    font-size:14px;
    line-height:1.8;
    background:rgba(255,255,255,.03);
}

.requirements h3{
    margin-bottom:10px;
    font-size:15px;
    letter-spacing:1px;
}

.valid{
    color:#79ff8a;
    font-weight:600;
}

.invalid{
    color:#ff6d6d;
}

button{
    width:100%;
    margin-top:22px;
    padding:13px;
    border:1px solid #fff;
    background:#fff;
    color:#000;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:.3s;
}

button:hover{
    background:#000;
    color:#fff;
}

/* Ripple */

.ripple{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,.55);
    transform:scale(0);
    animation:ripple .6s linear;
}

@keyframes ripple{
    to{
        transform:scale(4);
        opacity:0;
    }
}

small{
    display:block;
    margin-top:15px;
    text-align:center;
    color:#9d9d9d;
}
</style>

</head>

<body>

<div class="container">

<h1>LOGIN</h1>

<div class="subtitle">
Enter your 4-character Site Code.
</div>

<input
type="text"
id="code"
maxlength="4"
placeholder="Example: AB7#">

<div class="requirements">

<h3>Site Code Requirements</h3>

<div id="letters" class="invalid">✖ 2 Letters (A-Z)</div>
<div id="number" class="invalid">✖ 1 Number (0-9)</div>
<div id="special" class="invalid">✖ 1 Special Character (! @ # $ % ^ & *)</div>
<div id="length" class="invalid">✖ Exactly 4 Characters</div>

</div>

<button onclick="login(event)">PROCEED</button>

<small>Black • White • Secure Access</small>

</div>

<script>

const code=document.getElementById("code");

code.addEventListener("input",updateRequirements);

function updateRequirements(){

    const value=code.value.toUpperCase();

    const letters=(value.match(/[A-Z]/g)||[]).length;
    const numbers=(value.match(/[0-9]/g)||[]).length;
    const specials=(value.match(/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>/?]/g)||[]).length;

    setRequirement("letters",letters===2);
    setRequirement("number",numbers===1);
    setRequirement("special",specials===1);
    setRequirement("length",value.length===4);

}

function setRequirement(id,good){

    const item=document.getElementById(id);

    const text=item.textContent.substring(2);

    if(good){
        item.className="valid";
        item.textContent="✔ "+text;
    }else{
        item.className="invalid";
        item.textContent="✖ "+text;
    }

}

function login(){

    const value=code.value.toUpperCase();

    const pattern=/^(?=(?:.*[A-Z]){2})(?=.*\d)(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>/?])[A-Z\d!@#$%^&*()_+\-=\[\]{};':"\\|,.<>/?]{4}$/;

    if(!pattern.test(value)){
        alert(
`Invalid Site Code!

Your Site Code must contain:

• 2 Letters
• 1 Number
• 1 Special Character
• Exactly 4 Characters`
        );
        return;
    }

    alert("Access Granted");

    // Change later
    window.location.href="index.html";

}

/* Ripple Animation */

document.querySelector("button").addEventListener("click",function(e){

    const circle=document.createElement("span");

    const rect=this.getBoundingClientRect();

    circle.className="ripple";

    circle.style.left=(e.clientX-rect.left)+"px";
    circle.style.top=(e.clientY-rect.top)+"px";

    this.appendChild(circle);

    setTimeout(()=>circle.remove(),600);

});

</script>

</body>
</html>
