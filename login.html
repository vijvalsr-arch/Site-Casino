<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    background: #070A12;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Animated lighting background */
.background {
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 20% 30%, rgba(0,255,255,0.15), transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255,0,255,0.12), transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(0,140,255,0.10), transparent 50%);
    animation: moveLights 12s ease-in-out infinite alternate;
    filter: blur(20px);
}

@keyframes moveLights {
    0% {
        transform: translate(-10%, -10%) scale(1);
    }
    100% {
        transform: translate(-5%, -5%) scale(1.1);
    }
}

/* Main container */
.container {
    position: relative;
    width: 900px;
    max-width: 95%;
    height: 550px;
    display: flex;
    border-radius: 20px;
    overflow: hidden;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

/* Panels */
.panel {
    flex: 1;
    padding: 50px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 15px;
    transition: 0.4s ease;
}

.panel h2 {
    color: white;
    font-size: 28px;
    font-weight: 700;
}

.panel p {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
}

/* Inputs */
input {
    padding: 12px 14px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: white;
    transition: 0.2s;
}

input:focus {
    background: rgba(255,255,255,0.12);
    box-shadow: 0 0 10px rgba(0,200,255,0.3);
}

/* Buttons */
button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
}

.primary {
    background: linear-gradient(90deg, #00e5ff, #7c4dff);
    color: white;
}

.primary:hover {
    transform: scale(1.03);
    box-shadow: 0 0 15px rgba(0,229,255,0.4);
}

/* Divider */
.divider {
    width: 2px;
    background: linear-gradient(to bottom, transparent, rgba(0,255,255,0.6), transparent);
    box-shadow: 0 0 15px rgba(0,255,255,0.3);
}

/* Switch mode text */
.switch {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    text-decoration: underline;
}

/* Active state animations */
.container.signup-mode .login-panel {
    opacity: 0.3;
    transform: translateX(-10px);
}

.container.signup-mode .signup-panel {
    opacity: 1;
}

.container.login-mode .signup-panel {
    opacity: 0.3;
    transform: translateX(10px);
}

.container.login-mode .login-panel {
    opacity: 1;
}
</style>
</head>

<body>

<div class="background"></div>

<div class="container login-mode" id="container">

    <!-- LOGIN -->
    <div class="panel login-panel">
        <h2>Log In</h2>
        <p>Welcome back. Enter your details to continue.</p>

        <input type="text" placeholder="Username"/>
        <input type="password" placeholder="Password"/>

        <button class="primary">Log In</button>

        <p class="switch" onclick="toggleMode()">Don't have an account? Sign up</p>
    </div>

    <div class="divider"></div>

    <!-- SIGN UP -->
    <div class="panel signup-panel">
        <h2>Sign Up</h2>
        <p>Create a new account to get started.</p>

        <input type="text" placeholder="Username"/>
        <input type="email" placeholder="Email"/>
        <input type="password" placeholder="Password"/>

        <button class="primary">Create Account</button>

        <p class="switch" onclick="toggleMode()">Already have an account? Log in</p>
    </div>

</div>

<script>
const container = document.getElementById("container");

function toggleMode() {
    if (container.classList.contains("login-mode")) {
        container.classList.remove("login-mode");
        container.classList.add("signup-mode");
    } else {
        container.classList.remove("signup-mode");
        container.classList.add("login-mode");
    }
}
</script>

</body>
</html>
