<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  height: 100vh;
  background: #000;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* background light strips */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    90deg,
    #111 0px,
    #111 40px,
    #000 40px,
    #000 80px
  );
  opacity: 0.35;
  animation: move 14s linear infinite;
}

@keyframes move {
  0% { transform: translateX(0); }
  100% { transform: translateX(-80px); }
}

.container {
  position: relative;
  width: 360px;
  padding: 30px;
  border: 1px solid #fff;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);
  text-align: center;
  z-index: 2;
}

/* tabs */
.tabs {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
  border: 1px solid #fff;
}

.tab {
  flex: 1;
  padding: 10px;
  cursor: pointer;
  font-size: 13px;
  opacity: 0.6;
  transition: 0.3s;
}

.tab.active {
  background: #fff;
  color: #000;
  opacity: 1;
}

h1 {
  margin-bottom: 15px;
  letter-spacing: 2px;
  font-size: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: 1px solid #fff;
  background: transparent;
  color: #fff;
  outline: none;
  transition: 0.3s;
}

input:focus {
  box-shadow: 0 0 10px #fff;
  transform: scale(1.02);
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  border: 1px solid #fff;
  background: #fff;
  color: #000;
  font-weight: 700;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #000;
  color: #fff;
}

small {
  display: block;
  margin-top: 10px;
  opacity: 0.6;
  font-size: 11px;
}
</style>
</head>

<body>

<div class="container">

  <div class="tabs">
    <div class="tab active" id="loginTab" onclick="switchTab('login')">LOGIN</div>
    <div class="tab" id="signupTab" onclick="switchTab('signup')">SIGN UP</div>
  </div>

  <h1 id="title">LOGIN</h1>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <input type="text" id="loginCode" placeholder="Enter Code">
    <input type="password" id="loginPass" placeholder="Password">
    <button onclick="login()">PROCEED</button>
  </div>

  <!-- SIGNUP FORM -->
  <div id="signupForm" style="display:none;">
    <input type="text" id="signupCode" placeholder="Create Code">
    <input type="password" id="signupPass" placeholder="Password">
    <input type="password" id="signupConfirm" placeholder="Confirm Password">
    <button onclick="signup()">CREATE ACCOUNT</button>
  </div>

  <small>Black / White Secure Access</small>

</div>

<script>
let mode = "login";

function switchTab(tab) {
  mode = tab;

  document.getElementById("loginTab").classList.toggle("active", tab === "login");
  document.getElementById("signupTab").classList.toggle("active", tab === "signup");

  document.getElementById("loginForm").style.display = tab === "login" ? "block" : "none";
  document.getElementById("signupForm").style.display = tab === "signup" ? "block" : "none";

  document.getElementById("title").innerText = tab.toUpperCase();
}

function login() {
  const code = document.getElementById("loginCode").value;
  const pass = document.getElementById("loginPass").value;

  if (!code || !pass) return alert("Fill all fields");

  alert("Logging in...");
  window.location.href = "index.html";
}

function signup() {
  const code = document.getElementById("signupCode").value;
  const pass = document.getElementById("signupPass").value;
  const confirm = document.getElementById("signupConfirm").value;

  if (!code || !pass || !confirm) return alert("Fill all fields");

  if (pass !== confirm) return alert("Passwords do not match");

  alert("Account created!");
  window.location.href = "index.html";
}
</script>

</body>
</html>
