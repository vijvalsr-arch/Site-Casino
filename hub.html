<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Site Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

html{
scroll-behavior:smooth;
}

body{

background:#000;
color:white;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
position:relative;

}

/* Background */

body::before{

content:"";
position:absolute;
inset:-20%;

background:

radial-gradient(circle at 20% 20%,rgba(255,255,255,.08),transparent 35%),

radial-gradient(circle at 80% 75%,rgba(255,255,255,.05),transparent 40%),

radial-gradient(circle at 50% 50%,rgba(255,255,255,.02),transparent 60%);

animation:backgroundMove 18s linear infinite;

opacity:.9;

z-index:-2;

}

@keyframes backgroundMove{

0%{
transform:translate(0,0) rotate(0deg);
}

50%{
transform:translate(-40px,-30px) rotate(3deg);
}

100%{
transform:translate(0,0) rotate(0deg);
}

}

/* Grain */

body::after{

content:"";

position:absolute;

inset:0;

opacity:.03;

background-image:
repeating-radial-gradient(circle,#fff 0 1px,transparent 2px 6px);

animation:grain .25s steps(2) infinite;

pointer-events:none;

z-index:-1;

}

@keyframes grain{

0%{transform:translate(0,0);}
25%{transform:translate(3px,-2px);}
50%{transform:translate(-2px,3px);}
75%{transform:translate(2px,1px);}
100%{transform:translate(0,0);}

}

/* Main Frame */

.hub{

position:relative;

width:92%;

max-width:1350px;

height:84vh;

border:2px solid white;

display:flex;

overflow:hidden;

background:rgba(255,255,255,.02);

backdrop-filter:blur(8px);

box-shadow:

0 0 30px rgba(255,255,255,.08),

inset 0 0 40px rgba(255,255,255,.03);

animation:appear 1s ease;

}

@keyframes appear{

from{

opacity:0;

transform:scale(.97);

}

to{

opacity:1;

transform:scale(1);

}

}

/* White scan line */

.hub::before{

content:"";

position:absolute;

top:0;

left:-100%;

width:70%;

height:2px;

background:white;

opacity:.25;

animation:scan 7s linear infinite;

}

@keyframes scan{

0%{
left:-70%;
}

100%{
left:120%;
}

}

/* Header */

.header{

position:absolute;

top:18px;

left:24px;

font-size:13px;

letter-spacing:7px;

font-weight:700;

color:white;

opacity:.9;

z-index:50;

}

.sub{

position:absolute;

top:40px;

left:24px;

font-size:11px;

letter-spacing:3px;

color:#888;

z-index:50;

}

/* Sections */

.section{

flex:1;

position:relative;

display:flex;

justify-content:center;

align-items:center;

border-right:1px solid #2d2d2d;

cursor:pointer;

transition:.45s;

overflow:hidden;

}

.section:last-child{

border-right:none;

}

.section::before{

content:"";

position:absolute;

width:200%;

height:200%;

background:

radial-gradient(circle,

rgba(255,255,255,.16),

transparent 60%);

opacity:0;

transition:.45s;

}

.section:hover::before{

opacity:1;

}

.section:hover{

flex:1.35;

background:rgba(255,255,255,.025);

}

.inner{

position:relative;

display:flex;

flex-direction:column;

align-items:center;

gap:18px;

z-index:5;

transition:.4s;

}

.section:hover .inner{

transform:translateY(-10px);

}

/* Icons */

.icon{

width:64px;

height:64px;

border:2px solid white;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

font-size:28px;

transition:.35s;

}

.section:hover .icon{

transform:rotate(8deg) scale(1.08);

box-shadow:0 0 18px rgba(255,255,255,.25);

}

.title{

font-size:20px;

letter-spacing:5px;

font-weight:700;

text-transform:uppercase;

}

  .subtitle{

font-size:12px;

letter-spacing:2px;

color:#777;

text-transform:uppercase;

transition:.3s;

}

.section:hover .subtitle{

color:white;

letter-spacing:3px;

}

/* Corner Decorations */

.corner{

position:absolute;

width:20px;

height:20px;

border-color:white;

opacity:.35;

}

.tl{

top:12px;
left:12px;

border-top:2px solid white;
border-left:2px solid white;

}

.tr{

top:12px;
right:12px;

border-top:2px solid white;
border-right:2px solid white;

}

.bl{

bottom:12px;
left:12px;

border-bottom:2px solid white;
border-left:2px solid white;

}

.br{

bottom:12px;
right:12px;

border-bottom:2px solid white;
border-right:2px solid white;

}

/* Logout */

.logout{

position:absolute;

bottom:25px;

left:50%;

transform:translateX(-50%);

padding:12px 32px;

background:transparent;

color:white;

border:2px solid white;

letter-spacing:3px;

font-weight:700;

cursor:pointer;

transition:.35s;

z-index:100;

}

.logout:hover{

background:white;

color:black;

box-shadow:0 0 20px rgba(255,255,255,.35);

}

/* Responsive */

@media(max-width:900px){

.hub{

flex-direction:column;

height:95vh;

}

.section{

border-right:none;

border-bottom:1px solid #333;

}

.section:last-child{

border-bottom:none;

}

.section:hover{

flex:1;

}

}

</style>

</head>

<body>

<div class="hub">

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="header">THE HUB</div>

<div class="sub">
CONNECTED TO THE NETWORK
</div>

<div class="section" onclick="go('bank.html')">

<div class="inner">

<div class="icon">ξ</div>

<div class="title">BANK</div>

<div class="subtitle">
Store Honors
</div>

</div>

</div>

<div class="section" onclick="go('casino.html')">

<div class="inner">

<div class="icon">♠︎</div>

<div class="title">CASINO</div>

<div class="subtitle">
Take Risks
</div>

</div>

</div>

<div class="section" onclick="go('townhall.html')">

<div class="inner">

<div class="icon">ꕥ</div>

<div class="title">
Politics
</div>

<div class="subtitle">
Make the site great again!
</div>

</div>

</div>
<div class="section" onclick="go('chat.html')">

    <div class="inner">

        <div class="icon">☲</div>

        <div class="title">
            CHAT
        </div>

        <div class="subtitle">
            Talk to eachother
        </div>

    </div>

</div>

<div class="section" onclick="go('news.html')">

    <div class="inner">

        <div class="icon">⁂</div>

        <div class="title">
            NEWS
        </div>

        <div class="subtitle">
            Latest Updates
        </div>

    </div>

</div>

<button class="logout" onclick="go('login.html')">
    LOGOUT
</button>

</div>

<script>

function go(page){

    document.body.style.transition = "opacity .25s ease";
    document.body.style.opacity = "0";

    setTimeout(function(){

        window.location.href = page;

    },250);

}

// Fade in when page loads
window.onload = function(){

    document.body.style.opacity = "0";

    setTimeout(function(){

        document.body.style.transition = "opacity .4s ease";
        document.body.style.opacity = "1";

    },50);

};

// Keyboard shortcuts
document.addEventListener("keydown",function(e){

    switch(e.key.toLowerCase()){

        case "1":
            go("bank.html");
            break;

        case "2":
            go("casino.html");
            break;

        case "3":
            go("townhall.html");
            break;

        case "4":
            go("chat.html");
            break;

        case "5":
            go("news.html");
            break;

        case "escape":
            go("login.html");
            break;

    }

});

// Hover sound placeholder (optional)
const sections = document.querySelectorAll(".section");

sections.forEach(section => {

    section.addEventListener("mouseenter", () => {

        section.style.filter = "brightness(1.08)";

    });

    section.addEventListener("mouseleave", () => {

        section.style.filter = "brightness(1)";

    });

});

</script>

</body>
</html>
